  <text x="180" y="503" font-family="'Barlow Condensed', Arial Narrow, sans-serif" font-weight="700" font-size="16" fill="#fae04a" text-anchor="middle" letter-spacing="2">PESCARA · ABRUZZO</text>

  <!-- Right panel content -->
  <!-- Panel header label -->
