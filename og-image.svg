<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1425"/>
      <stop offset="50%" stop-color="#132648"/>
      <stop offset="100%" stop-color="#0b1528"/>
    </linearGradient>
    <!-- Yellow glow top-right -->
    <radialGradient id="glow1" cx="78%" cy="22%" r="28%">
      <stop offset="0%" stop-color="#fae04a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fae04a" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle top-left light -->
    <radialGradient id="glow2" cx="12%" cy="15%" r="22%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom gradient bar -->
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fae04a" stop-opacity="0"/>
      <stop offset="20%" stop-color="#fae04a" stop-opacity="1"/>
      <stop offset="80%" stop-color="#fae04a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fae04a" stop-opacity="0"/>
    </linearGradient>
    <!-- Right panel gradient -->
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3060" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d1e3a" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Diagonal light beam -->
  <polygon points="700,0 1200,0 1200,630 820,630" fill="#fae04a" opacity="0.025"/>

  <!-- Right info panel -->
  <rect x="740" y="60" width="400" height="510" rx="24" fill="url(#panel)" opacity="0.8"/>
  <rect x="740" y="60" width="400" height="510" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <!-- top accent line on panel -->
  <rect x="740" y="60" width="400" height="3" rx="1.5" fill="#fae04a" opacity="0.7"/>

