  </g>

  <!-- Tagline below logo -->
  <text x="70" y="268" font-family="'Barlow Condensed', Arial Narrow, sans-serif" font-weight="700" font-size="22" fill="#fae04a" opacity="0.85" letter-spacing="3">CONSULENZA INTEGRATA</text>

  <!-- Divider line -->
  <rect x="70" y="288" width="320" height="2" fill="#fae04a" opacity="0.25"/>

  <!-- Main claim -->
  <text x="70" y="340" font-family="'Barlow Condensed', Arial Narrow, sans-serif" font-weight="800" font-size="52" fill="#ffffff" letter-spacing="-0.5">Soluzioni integrate.</text>
  <text x="70" y="398" font-family="'Barlow Condensed', Arial Narrow, sans-serif" font-weight="800" font-size="52" fill="#fae04a" letter-spacing="-0.5">Risultati immediati.</text>

